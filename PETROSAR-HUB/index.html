<title>PETROSAR SA — Panel Central</title>
<style>
:root {
  --navy:   #1b2c3e;
  --navy2:  #14212f;
  --accent: #e8a020;
  --bg:     #f0f2f6;
  --card:   #ffffff;
  --border: #e2e8f0;
  --text:   #1a202c;
  --muted:  #94a3b8;
  --op:  #0d9488;  --op-l:  #ccfbf1;
  --tr:  #2563eb;  --tr-l:  #dbeafe;
  --mt:  #7c3aed;  --mt-l:  #ede9fe;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: 200px; flex-shrink: 0;
  background: var(--navy);
  display: flex; flex-direction: column;
  height: 100vh;
  box-shadow: 4px 0 18px rgba(0,0,0,0.22);
}
.sb-brand {
  padding: 18px 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
}
.sb-logo { width: 34px; height: 34px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.sb-logo img { width: 100%; height: 100%; object-fit: contain; }
.sb-brand-name { font-size: 0.8rem; font-weight: 700; color: #fff; line-height: 1.2; }
.sb-brand-sub  { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }

.sb-label {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
  padding: 16px 16px 8px;
}

.sb-nav { display: flex; flex-direction: column; gap: 4px; padding: 0 10px; }

.sb-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px; border-radius: 10px;
  cursor: pointer; border: none; background: none;
  transition: background .14s; font-family: inherit;
  text-align: left; width: 100%;
}
.sb-btn:hover { background: rgba(255,255,255,0.07); }
.sb-btn.active { background: rgba(255,255,255,0.12); }
.sb-btn-dot {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.sb-btn-texts { display: flex; flex-direction: column; }
.sb-btn-name {
  font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.7);
  line-height: 1.2;
}
.sb-btn.active .sb-btn-name { color: #fff; }
.sb-btn-count {
  font-size: 0.62rem; color: var(--muted); margin-top: 1px;
}
.sb-btn.active .sb-btn-count { color: rgba(255,255,255,0.5); }

/* left accent bar */
.sb-btn.active::before {
  content: ''; position: absolute; left: 0;
  width: 3px; height: 32px; border-radius: 0 3px 3px 0;
  background: var(--accent);
}
.sb-btn { position: relative; }

.sb-spacer { flex: 1; }
.sb-footer {
  padding: 12px 10px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: column; gap: 5px;
}
.sb-edit-btn {
  width: 100%; padding: 7px 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: rgba(255,255,255,0.5);
  font-size: 0.72rem; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all .14s;
}
.sb-edit-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.sb-edit-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.sb-save-btn {
  display: none; width: 100%; padding: 7px 10px;
  background: #166534; border: none; border-radius: 8px;
  color: #fff; font-size: 0.72rem; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.sb-save-btn.show { display: block; }

/* ═══ MAIN ═══ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 50px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-dot  { width: 10px; height: 10px; border-radius: 50%; }
.topbar-title { font-size: 0.88rem; font-weight: 700; color: var(--text); }
.topbar-back {
  display: none; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  font-size: 0.78rem; color: var(--muted); font-family: inherit;
  padding: 4px 8px; border-radius: 6px; transition: background .12s;
}
.topbar-back:hover { background: var(--bg); color: var(--text); }
.topbar-back.show { display: flex; }

.btn-add {
  display: none; align-items: center; gap: 5px;
  padding: 6px 14px; background: var(--navy); color: #fff;
  border: none; border-radius: 7px; font-size: 0.76rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
}
.btn-add:hover { background: var(--navy2); }
.edit-mode .btn-add { display: inline-flex; }

/* ═══ PANELS ═══ */
.panel { flex: 1; overflow-y: auto; }
.panel.off { display: none; }

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; padding: 40px;
  text-align: center;
}
.w-logo { width: 64px; height: 64px; border-radius: 16px; overflow: hidden; margin: 0 auto 14px; box-shadow: 0 8px 28px rgba(0,0,0,0.13); }
.w-logo img { width: 100%; height: 100%; object-fit: contain; }
.w-title { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.w-sub   { font-size: 0.82rem; color: var(--muted); }

/* Area panel */
.area-panel { padding: 28px 32px; }
.area-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
}
.area-header-dot {
  width: 12px; height: 12px; border-radius: 50%;
}
.area-header-name {
  font-size: 1.15rem; font-weight: 800; 
}
.area-header-count {
  font-size: 0.72rem; font-weight: 700; padding: 2px 10px;
  border-radius: 99px; color: #fff; margin-left: 2px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 14px;
}
.dc {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 20px 18px 16px;
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; cursor: pointer; text-align: center;
  transition: box-shadow .14s, transform .14s;
  position: relative;
}
.dc:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
.dc-icon {
  width: 54px; height: 54px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
}
.dc-name { font-size: 0.82rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.dc-desc { font-size: 0.73rem; color: var(--muted); line-height: 1.4; }
.dc-badge {
  font-size: 0.63rem; font-weight: 700; padding: 2px 9px;
  border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em;
}
.s-disponible { background:#dcfce7; color:#166534; }
.s-desarrollo  { background:#fef9c3; color:#854d0e; }
.s-piloto      { background:#dbeafe; color:#1e40af; }
.s-pendiente   { background:#f1f5f9; color:#64748b; }

/* edit controls on card */
.dc-edit-btns {
  display: none; position: absolute; top: 8px; right: 8px;
  gap: 4px;
}
.dc-edit-btns button {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: #f8fafc;
  cursor: pointer; font-size: 0.75rem; display: flex;
  align-items: center; justify-content: center; transition: background .1s;
}
.dc-edit-btns button:hover { background: #e2e8f0; }
.dc-edit-btns .del:hover    { background: #fee2e2; border-color: #fca5a5; }
.edit-mode .dc-edit-btns    { display: flex; }

.add-card {
  display: none; border: 2px dashed #cbd5e1; border-radius: 14px;
  padding: 20px; background: none; cursor: pointer;
  font-size: 0.8rem; color: var(--muted); font-weight: 600;
  align-items: center; justify-content: center; gap: 6px;
  transition: border-color .14s, color .14s; font-family: inherit;
  flex-direction: column;
}
.add-card:hover { border-color: var(--accent); color: var(--accent); }
.edit-mode .add-card { display: flex; }

/* iframe panel */
.iframe-panel { flex: 1; display: none; flex-direction: column; }
.iframe-panel.show { display: flex; }
.iframe-panel iframe { flex: 1; border: none; width: 100%; }

/* ═══ MODAL ═══ */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
.overlay.on { display:flex; }
.modal { background:#fff; border-radius:14px; width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,0.22); overflow:hidden; }
.m-hd { background:var(--navy); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
.m-hd-t { color:#fff; font-weight:700; font-size:0.88rem; }
.m-hd button { background:none; border:none; color:rgba(255,255,255,0.5); font-size:1.2rem; cursor:pointer; }
.m-bd { padding:20px 18px; display:flex; flex-direction:column; gap:12px; }
.field label { display:block; font-size:0.68rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:4px; }
.field input,.field textarea,.field select { width:100%; border:1.5px solid var(--border); border-radius:7px; padding:8px 11px; font-size:0.84rem; font-family:inherit; outline:none; background:#fafbfc; transition:border-color .12s; }
.field input:focus,.field textarea:focus,.field select:focus { border-color:var(--accent); background:#fff; }
.field textarea { resize:vertical; min-height:55px; }
.m-ft { padding:12px 18px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.btn-cancel { padding:6px 14px; background:#f1f5f9; color:#475569; border:1.5px solid var(--border); border-radius:7px; cursor:pointer; font-size:0.8rem; font-weight:600; font-family:inherit; }
.btn-ok     { padding:6px 14px; background:var(--navy); color:#fff; border:none; border-radius:7px; cursor:pointer; font-size:0.8rem; font-weight:600; font-family:inherit; }
.icon-grid  { display:flex; flex-wrap:wrap; gap:6px; }
.icon-opt   { width:32px; height:32px; border-radius:6px; border:1.5px solid var(--border); background:#f8fafc; cursor:pointer; font-size:.95rem; display:flex; align-items:center; justify-content:center; }
.icon-opt.sel { border-color:var(--accent); background:#fff8e6; }
</style>
</head>

<!-- MAIN -->
<div class="main" id="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot" id="t-dot" style="display:none"></div>
      <div>
        <div class="topbar-title" id="t-title">Panel Central — PETROSAR SA</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="topbar-back" id="back-btn" onclick="goBack()">← Volver</button>
      <button class="btn-add" id="add-btn" onclick="openModal(null)">＋ Agregar dashboard</button>

<!-- MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="m-hd">

      <div class="field"><label>Descripción</label><textarea id="f-desc" placeholder="Qué muestra este dashboard…"></textarea></div>
      <div class="field"><label>URL o ruta del archivo</label><input id="f-url" type="text" placeholder="https://… o ./archivo.html"></div>
      <div class="field"><label>Estado</label>
        <select id="f-status">
          <option value="disponible">✅ Disponible</option>
          <option value="piloto">🔵 Piloto</option>
          <option value="desarrollo">🟡 En desarrollo</option>
          <option value="pendiente">⚪ Pendiente</option>
        </select>
      </div>
      <div class="field"><label>Ícono</label><div class="icon-grid" id="ig"><button class="icon-opt" type="button">📊</button><button class="icon-opt" type="button">📋</button><button class="icon-opt" type="button">🚛</button><button class="icon-opt" type="button">🛻</button><button class="icon-opt" type="button">⚙️</button><button class="icon-opt" type="button">🔧</button><button class="icon-opt" type="button">🗂️</button><button class="icon-opt" type="button">📡</button><button class="icon-opt" type="button">🛡️</button><button class="icon-opt" type="button">📈</button><button class="icon-opt" type="button">🗺️</button><button class="icon-opt" type="button">🏗️</button><button class="icon-opt" type="button">⛽</button><button class="icon-opt" type="button">🔩</button><button class="icon-opt" type="button">📌</button><button class="icon-opt" type="button">🧾</button><button class="icon-opt" type="button">🚦</button><button class="icon-opt" type="button">🏭</button><button class="icon-opt" type="button">🔍</button><button class="icon-opt" type="button">📂</button></div></div>
    </div>

      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-ok" onclick="saveCard()">Guardar</button>
    </div>

<script>
const SUPABASE_URL = "https://ahapckaovtgnxhwyuetw.supabase.co";
const SUPABASE_KEY = "sb_publishable_TKbj-awpHudWIXSWprQhEg_OB8-urlg";

const ICONS = ["📊","📋","🚛","🛻","⚙️","🔧","🗂️","📡","🛡️","📈","🗺️","🏗️","⛽","🔩","📌","🧾","🚦","🏭","🔍","📂"];
const AREAS = {
  operaciones:   { label:"Operaciones",           color:"#0d9488", light:"#ccfbf1" },
  transporte:    { label:"Transporte de Personal", color:"#2563eb", light:"#dbeafe" },
  mantenimiento: { label:"Mantenimiento",          color:"#7c3aed", light:"#ede9fe" },
  estacion:      { label:"Estación de Servicio",   color:"#c2410c", light:"#ffedd5" },
};
const SL = { disponible:"Disponible", desarrollo:"En desarrollo", piloto:"Piloto", pendiente:"Pendiente" };

let data     = { operaciones:[], transporte:[], mantenimiento:[], estacion:[] };
let editMode = false;
let curArea  = null;
let editing  = null;

async function sbFetch(path, opts={}) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(opts.headers||{})
    }
  });
  if (!res.ok) { const e = await res.text(); console.error(e); return null; }
  return res.status === 204 ? null : res.json();
}

async function loadFromSupabase() {
  const rows = await sbFetch("dashboards?order=orden.asc");
  if (!rows) return;
  data = { operaciones:[], transporte:[], mantenimiento:[], estacion:[] };
  rows.forEach(r => {
    if (data[r.area]) data[r.area].push({ id:r.id, name:r.name, desc:r.description||"", url:r.url||"#", status:r.status||"disponible", icon:r.icon||"📊" });
  });
  updateCounts();
  if (curArea) renderCards(curArea);
}

async function saveCardToSupabase(card, area, isEdit) {
  const row = { id:card.id, area, name:card.name, description:card.desc, url:card.url, status:card.status, icon:card.icon, orden:Date.now() };
  if (isEdit) await sbFetch("dashboards?id=eq."+card.id, { method:"PATCH", body: JSON.stringify(row) });
  else        await sbFetch("dashboards", { method:"POST", body: JSON.stringify(row) });
}

async function deleteCardFromSupabase(id) {
  await sbFetch("dashboards?id=eq."+id, { method:"DELETE" });
}

ICONS.forEach(ic => {
  const b = document.createElement("button");
  b.className="icon-opt"; b.textContent=ic; b.type="button";
  b.onclick=()=>{ document.querySelectorAll(".icon-opt").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); };
  document.getElementById("ig").appendChild(b);
});

function updateCounts() {
  Object.keys(AREAS).forEach(aid => {
    const n = (data[aid]||[]).length;
    document.getElementById("cnt-"+aid).textContent = n + (n===1?" dashboard":" dashboards");
  });
}

function selectArea(aid) {
  curArea = aid;
  const meta = AREAS[aid];
  document.querySelectorAll(".sb-btn").forEach(b => b.classList.toggle("active", b.dataset.area===aid));
  document.getElementById("t-dot").style.cssText = "display:block;background:"+meta.color;
  document.getElementById("t-title").textContent = meta.label;
  document.getElementById("back-btn").classList.remove("show");
  document.getElementById("ah-dot").style.background  = meta.color;
  document.getElementById("ah-name").textContent       = meta.label;
  document.getElementById("ah-name").style.color       = meta.color;
  document.getElementById("ah-count").textContent      = (data[aid]||[]).length + " dashboards";
  document.getElementById("ah-count").style.background = meta.color;
  renderCards(aid);
  show("p-area");
}

function renderCards(aid) {
  const meta  = AREAS[aid];
  const items = data[aid]||[];
  const grid  = document.getElementById("cards-grid");
  grid.innerHTML = "";
  items.forEach(d => {
    const el = document.createElement("div");
    el.className = "dc";
    el.innerHTML = `
      <div class="dc-edit-btns">
        <button title="Editar" onclick="event.stopPropagation();openModal('${d.id}')">✏️</button>
        <button class="del" title="Eliminar" onclick="event.stopPropagation();delCard('${d.id}')">🗑️</button>
      </div>
      <div class="dc-icon" style="background:${meta.light}">${d.icon}</div>
      <div class="dc-name">${d.name}</div>
      <div class="dc-desc">${d.desc}</div>
      <span class="dc-badge s-${d.status}">${SL[d.status]||d.status}</span>`;
    el.onclick = () => openDash(d);
    grid.appendChild(el);
  });
  const ab = document.createElement("button");
  ab.className = "add-card";
  ab.innerHTML = "<span style=font-size:1.3rem>＋</span><span>Agregar dashboard</span>";
  ab.onclick = () => openModal(null);
  grid.appendChild(ab);
  document.getElementById("main").classList.toggle("edit-mode", editMode);
}

function openDash(d) {
  if (!d.url || d.url==="#") return;
  const external = ["datastudio.google.com","lookerstudio.google.com","script.google.com","fleetchek-tpte.web.app","hosted.app","No%20Conformidades","No Conformidades","nc-manager.vercel.app"];
  if (external.some(e => d.url.includes(e))) { window.open(d.url, "_blank"); return; }
  document.getElementById("frm").src = d.url;
  document.getElementById("t-title").textContent = d.name;
  document.getElementById("back-btn").classList.add("show");
  show("p-iframe");
}

function goBack() {
  document.getElementById("frm").src = "about:blank";
  document.getElementById("back-btn").classList.remove("show");
  if (curArea) selectArea(curArea);
  else show("p-welcome");
}

function show(id) {
  ["p-welcome","p-area","p-iframe"].forEach(p => {
    const el = document.getElementById(p);
    if (p==="p-iframe") el.classList.toggle("show", p===id);
    else                 el.classList.toggle("off",  p!==id);
  });
}

function toggleEdit() {
  editMode = !editMode;
  const eb = document.getElementById("edit-btn");
  const sb = document.getElementById("save-btn");
  eb.classList.toggle("on", editMode);
  eb.textContent = editMode ? "✏️ Editando…" : "✏️ Editar";
  sb.classList.toggle("show", editMode);
  document.getElementById("main").classList.toggle("edit-mode", editMode);
  if (curArea) renderCards(curArea);
}

function saveAll() {
  const btn = document.getElementById("save-btn");
  btn.textContent="✅ Guardado";
  setTimeout(()=>{ btn.textContent="💾 Guardar"; },2000);
}

function openModal(id) {
  editing = id ? { area: curArea, id } : null;
  document.getElementById("m-title").textContent = id ? "Editar Dashboard" : "Nuevo Dashboard";
  if (id) {
    const d = (data[curArea]||[]).find(x=>x.id===id);
    document.getElementById("f-name").value   = d.name;
    document.getElementById("f-desc").value   = d.desc;
    document.getElementById("f-url").value    = d.url;
    document.getElementById("f-status").value = d.status;
    document.querySelectorAll(".icon-opt").forEach(el=>el.classList.toggle("sel",el.textContent===d.icon));
  } else {
    ["f-name","f-desc","f-url"].forEach(i=>document.getElementById(i).value="");
    document.getElementById("f-status").value="disponible";
    document.querySelectorAll(".icon-opt").forEach((el,i)=>el.classList.toggle("sel",i===0));
  }
  document.getElementById("modal").classList.add("on");
}

function closeModal() { document.getElementById("modal").classList.remove("on"); }

async function saveCard() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("El nombre es obligatorio."); return; }
  const icon = document.querySelector(".icon-opt.sel")?.textContent||"📊";
  const card = { id: editing?.id||"c_"+Date.now(), name, icon,
    desc:   document.getElementById("f-desc").value.trim(),
    url:    document.getElementById("f-url").value.trim()||"#",
    status: document.getElementById("f-status").value };
  const aid = curArea;
  if (!data[aid]) data[aid]=[];
  const isEdit = !!editing;
  if (isEdit) { const i=data[aid].findIndex(x=>x.id===editing.id); data[aid][i]=card; }
  else        { data[aid].push(card); }
  await saveCardToSupabase(card, aid, isEdit);
  closeModal();
  updateCounts();
  renderCards(aid);
}

async function delCard(id) {
  if (!confirm("¿Eliminar este dashboard?")) return;
  data[curArea] = (data[curArea]||[]).filter(x=>x.id!==id);
  await deleteCardFromSupabase(id);
  updateCounts();
  renderCards(curArea);
}

loadFromSupabase();
</script>
